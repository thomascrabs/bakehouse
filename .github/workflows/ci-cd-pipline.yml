name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  ci:
    name: Build, Test, and Synthesize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Synthesize CDK application
        run: npx cdk synth

  deploy:
    name: Deploy CDK application
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ASIA4BMHXJEZ2SZU6DP4
          aws-secret-access-key: kiNpt+IfgTxwyHFfY4Bcy0SLEgZ0N4VChvPfsy8h
          aws-region: eu-west-2
      - name: Install dependencies
        run: npm ci
      - name: Bootstrap CDK environment
        run: npx cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ secrets.AWS_REGION }} --require-approval never
      - name: Deploy CDK stacks
        run: npx cdk deploy --all --require-approval never
